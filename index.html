<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TBOrder — The Bap Kiosk System</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#0D0D0D;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{max-width:800px;width:100%;padding:40px}
.logo{text-align:center;margin-bottom:48px}
.logo h1{font-size:42px;font-weight:700;color:#E85D75;letter-spacing:-1px}
.logo p{color:#666;font-size:15px;margin-top:8px}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:40px}
.card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:20px;padding:32px 24px;text-align:center;text-decoration:none;color:#fff;transition:all .3s;cursor:pointer;display:block}
.card:hover{border-color:#E85D75;transform:translateY(-4px);box-shadow:0 12px 40px rgba(232,93,117,.15)}
.card .icon{font-size:48px;margin-bottom:16px}
.card h2{font-size:18px;font-weight:600;margin-bottom:8px}
.card p{color:#888;font-size:13px;line-height:1.5}
.card .tag{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;margin-top:12px}
.tag-order{background:rgba(232,93,117,.15);color:#E85D75}
.tag-kitchen{background:rgba(52,199,89,.15);color:#34C759}
.tag-admin{background:rgba(100,100,255,.15);color:#8888ff}
.info{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:24px;margin-bottom:20px}
.info h3{font-size:14px;color:#888;margin-bottom:12px;font-weight:500}
.url-row{display:flex;align-items:center;gap:12px;padding:8px 0}
.url-label{color:#888;font-size:13px;width:60px}
.url-val{color:#E85D75;font-family:'SF Mono',monospace;font-size:13px;background:#111;padding:6px 12px;border-radius:8px;flex:1}
.status{text-align:center;color:#666;font-size:13px;margin-top:24px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;background:#666}
.dot.on{background:#34C759;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.github{text-align:center;margin-top:32px;color:#444;font-size:12px}
.github a{color:#666;text-decoration:none}
.github a:hover{color:#E85D75}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1>🍚 TBPos</h1>
    <p>The Bap (더밥) — Kiosk System</p>
  </div>

  <div class="cards">
    <a class="card" href="/order" id="linkOrder">
      <div class="icon">🖥️</div>
      <h2>주문 키오스크</h2>
      <p>Order Kiosk<br>고객 주문 화면</p>
      <span class="tag tag-order">21.5" 세로</span>
    </a>
    <a class="card" href="/kitchen" id="linkKitchen">
      <div class="icon">🍳</div>
      <h2>주방 디스플레이</h2>
      <p>Kitchen Display<br>주문 접수 화면</p>
      <span class="tag tag-kitchen">가로 화면</span>
    </a>
    <a class="card" href="/admin" id="linkAdmin">
      <div class="icon">⚙️</div>
      <h2>관리자 패널</h2>
      <p>Admin Panel<br>메뉴·지점·주문 관리</p>
      <span class="tag tag-admin">데스크탑</span>
    </a>
  </div>

  <div class="info">
    <h3>접속 URL (같은 WiFi에서)</h3>
    <div class="url-row"><span class="url-label">주문</span><span class="url-val" id="urlOrder">-</span></div>
    <div class="url-row"><span class="url-label">주방</span><span class="url-val" id="urlKitchen">-</span></div>
    <div class="url-row"><span class="url-label">관리</span><span class="url-val" id="urlAdmin">-</span></div>
  </div>

  <div class="status">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">서버 연결 확인 중...</span>
  </div>

  <div class="github">
    <a href="https://github.com/ilovecpu/TBOrder" target="_blank">GitHub: ilovecpu/TBOrder</a>
  </div>
</div>

<script>
function checkServer() {
  fetch('/api/health').then(r => r.json()).then(d => {
    const base = 'http://' + d.ip + ':' + d.port;
    document.getElementById('urlOrder').textContent = base + '/order';
    document.getElementById('urlKitchen').textContent = base + '/kitchen';
    document.getElementById('urlAdmin').textContent = base + '/admin';
    document.getElementById('statusDot').className = 'dot on';
    document.getElementById('statusText').textContent =
      `서버 실행중 | 주문:${d.clients.order} 주방:${d.clients.kitchen} 관리:${d.clients.admin} | 오늘 ${d.dailyOrders}건`;
  }).catch(() => {
    document.getElementById('statusDot').className = 'dot';
    document.getElementById('statusText').textContent = '서버 연결 안됨';
  });
}
checkServer();
setInterval(checkServer, 5000);
</script>
</body>
</html>
